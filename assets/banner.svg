<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a051b" />
      <stop offset="50%" stop-color="#0d0d26" />
      <stop offset="100%" stop-color="#02000a" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Accent Gradients -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f355da" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="15" fill="url(#bgGrad)" />

  <style>
    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.9; }
    }
    @keyframes prune {
      0%, 100% { stroke-dashoffset: 0; opacity: 0.8; }
      50% { stroke-dashoffset: 20; opacity: 0.1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
    }
    .node-active {
      animation: pulse 3s infinite ease-in-out;
    }
    .node-pruned {
      animation: pulse 4s infinite ease-in-out;
      opacity: 0.15;
    }
    .edge-active {
      stroke-dasharray: 5, 5;
      animation: prune 6s infinite linear;
    }
    .edge-pruned {
      opacity: 0.1;
      stroke-dasharray: 2, 8;
    }
    .title-text {
      font-family: 'Outfit', 'Inter', 'Segoe UI', sans-serif;
      font-weight: 800;
      fill: #ffffff;
      font-size: 32px;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      font-weight: 400;
      fill: #00f2fe;
      font-size: 14px;
      letter-spacing: 4px;
      opacity: 0.9;
    }
  </style>

  <!-- Network Pattern Decoration (Left Side) -->
  <g opacity="0.65" transform="translate(40, 10)">
    <!-- Connections -->
    <line x1="20" y1="50" x2="90" y2="30" stroke="#7000ff" stroke-width="1.5" class="edge-active" />
    <line x1="20" y1="50" x2="90" y2="100" stroke="#00f2fe" stroke-width="1.5" class="edge-active" />
    <line x1="20" y1="150" x2="90" y2="100" stroke="#00f2fe" stroke-width="1" class="edge-pruned" />
    <line x1="20" y1="150" x2="90" y2="160" stroke="#7000ff" stroke-width="1" class="edge-pruned" />
    
    <line x1="90" y1="30" x2="160" y2="50" stroke="#7000ff" stroke-width="2" class="edge-active" />
    <line x1="90" y1="100" x2="160" y2="50" stroke="#00f2fe" stroke-width="1.5" class="edge-active" />
    <line x1="90" y1="100" x2="160" y2="130" stroke="#7000ff" stroke-width="1.5" class="edge-active" />
    <line x1="90" y1="160" x2="160" y2="130" stroke="#00f2fe" stroke-width="0.8" class="edge-pruned" />

    <!-- Nodes -->
    <circle cx="20" cy="50" r="5" fill="#00f2fe" filter="url(#glow)" class="node-active" />
    <circle cx="20" cy="150" r="4" fill="#7000ff" class="node-pruned" />
    
    <circle cx="90" cy="30" r="6" fill="#7000ff" filter="url(#glow)" class="node-active" />
    <circle cx="90" cy="100" r="5" fill="#00f2fe" filter="url(#glow)" class="node-active" />
    <circle cx="90" cy="160" r="4" fill="#7000ff" class="node-pruned" />
    
    <circle cx="160" cy="50" r="7" fill="#00f2fe" filter="url(#glow)" class="node-active" />
    <circle cx="160" cy="130" r="5" fill="#7000ff" filter="url(#glow)" class="node-active" />
  </g>

  <!-- Network Pattern Decoration (Right Side) -->
  <g opacity="0.65" transform="translate(560, 10)">
    <!-- Connections -->
    <line x1="40" y1="50" x2="110" y2="30" stroke="#00f2fe" stroke-width="1.5" class="edge-active" />
    <line x1="40" y1="50" x2="110" y2="100" stroke="#7000ff" stroke-width="1" class="edge-pruned" />
    <line x1="40" y1="150" x2="110" y2="100" stroke="#00f2fe" stroke-width="1.5" class="edge-active" />
    <line x1="40" y1="150" x2="110" y2="160" stroke="#7000ff" stroke-width="1.5" class="edge-active" />
    
    <line x1="110" y1="30" x2="180" y2="80" stroke="#00f2fe" stroke-width="2" class="edge-active" />
    <line x1="110" y1="100" x2="180" y2="80" stroke="#7000ff" stroke-width="1" class="edge-pruned" />
    <line x1="110" y1="160" x2="180" y2="140" stroke="#7000ff" stroke-width="1.5" class="edge-active" />

    <!-- Nodes -->
    <circle cx="40" cy="50" r="5" fill="#00f2fe" filter="url(#glow)" class="node-active" />
    <circle cx="40" cy="150" r="6" fill="#7000ff" filter="url(#glow)" class="node-active" />
    
    <circle cx="110" cy="30" r="4" fill="#7000ff" class="node-pruned" />
    <circle cx="110" cy="100" r="5" fill="#00f2fe" filter="url(#glow)" class="node-active" />
    <circle cx="110" cy="160" r="6" fill="#7000ff" filter="url(#glow)" class="node-active" />
    
    <circle cx="180" cy="80" r="6" fill="#00f2fe" filter="url(#glow)" class="node-active" />
    <circle cx="180" cy="140" r="5" fill="#7000ff" filter="url(#glow)" class="node-active" />
  </g>

  <!-- Typography / Text (Center) -->
  <g transform="translate(400, 100)" text-anchor="middle">
    <!-- Title with subtle shadow glow -->
    <text y="-10" class="title-text" filter="url(#glow)">AWESOME WEIGHT PRUNING</text>
    <!-- Subtitle -->
    <text y="25" class="subtitle-text">MODEL COMPRESSION &amp; SPARSITY</text>
  </g>
</svg>
